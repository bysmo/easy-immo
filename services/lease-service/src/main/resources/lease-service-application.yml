spring:
  application:
    name: LEASE-SERVICE
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/easy_immo_lease}
    username: ${SPRING_DATASOURCE_USERNAME:easy_user}
    password: ${SPRING_DATASOURCE_PASSWORD:pgpass123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:easy}
    password: ${RABBITMQ_PASS:easy123}

  security:
    oauth2:
      resourceserver:
        jwt:
          # FIX: jwk-set-uri au lieu de issuer-uri pour éviter le mismatch en Docker
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/easy-immo/protocol/openid-connect/certs

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761}/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
