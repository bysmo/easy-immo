# Configuration commune à tous les services
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  level:
    com.easyimmo: DEBUG
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: docker
  security:
    oauth2:
      resourceserver:
        jwt:
          # FIX: jwk-set-uri seul — issuer-uri prendrait le dessus et causerait un mismatch
          jwk-set-uri: http://keycloak:8080/realms/easy-immo/protocol/openid-connect/certs
