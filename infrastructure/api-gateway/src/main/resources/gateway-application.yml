spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

  security:
    oauth2:
      resourceserver:
        jwt:
          # FIX: jwk-set-uri au lieu de issuer-uri
          # Le token est émis depuis localhost:8180 (navigateur) mais le gateway
          # est dans Docker et voit keycloak:8080. issuer-uri valide le claim 'iss'
          # ce qui cause un mismatch 401. jwk-set-uri ne valide que la signature.
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/easy-immo/protocol/openid-connect/certs

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:redis123}

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # ── Tenant Service ──────────────────────────────────
        - id: tenant-service
          uri: lb://TENANT-SERVICE
          predicates:
            - Path=/api/tenants/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 50

        # ── Property Service ────────────────────────────────
        - id: property-service
          uri: lb://PROPERTY-SERVICE
          predicates:
            - Path=/api/properties/**

        # ── Lease Service ───────────────────────────────────
        - id: lease-service
          uri: lb://LEASE-SERVICE
          predicates:
            - Path=/api/leases/**

        # ── Payment Service ─────────────────────────────────
        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/payments/**

        # ── Document Service ────────────────────────────────
        - id: document-service
          uri: lb://DOCUMENT-SERVICE
          predicates:
            - Path=/api/documents/**

        # ── Notification Service ────────────────────────────
        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**

        # ── Billing Service ─────────────────────────────────
        - id: billing-service
          uri: lb://BILLING-SERVICE
          predicates:
            - Path=/api/billing/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761}/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true